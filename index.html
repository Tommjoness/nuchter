<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Nuchter" />
  <meta name="theme-color" content="#080c14" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Nuchter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    @font-face { font-family: 'Unbounded'; font-display: swap; }
    @font-face { font-family: 'DM Mono'; font-display: swap; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080c14; --s1: #0e1520; --s2: #141e2e; --s3: #1a2638;
      --accent: #a78bfa; --accent2: #34d399; --gold: #fbbf24; --danger: #f87171;
      --text: #f0f4ff; --muted: #3d5070; --faint: #182030;
      --font-display: 'Unbounded', 'Georgia', sans-serif;
      --font-mono: 'DM Mono', 'Courier New', monospace;
    }
    html { height: 100%; }
    body { min-height: 100dvh; background: var(--bg); color: var(--text); font-family: var(--font-mono); overflow-x: hidden; padding-bottom: calc(env(safe-area-inset-bottom) + 32px); color-scheme: dark; }
    .bg-layer { position: fixed; inset: 0; z-index: 0; pointer-events: none; background: radial-gradient(ellipse 70% 50% at 15% 10%, #a78bfa0d 0%, transparent 60%), radial-gradient(ellipse 50% 40% at 85% 80%, #34d3990a 0%, transparent 60%), var(--bg); }
    .app { position: relative; z-index: 1; max-width: 430px; margin: 0 auto; padding: 0 20px 40px; }

    /* HEADER */
    .header { padding: 56px 0 28px; display: flex; flex-direction: column; gap: 4px; }
    .header-label { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); }
    .header-title { font-family: var(--font-display); font-weight: 900; font-size: clamp(28px,8vw,36px); letter-spacing: -1px; line-height: 1; }
    .header-title span { color: var(--accent); }
    .since-label { font-size: 10px; color: var(--muted); margin-top: 6px; }

    /* TABS */
    .tabs { display: flex; gap: 4px; background: var(--s1); border: 1px solid var(--faint); border-radius: 12px; padding: 4px; margin-bottom: 16px; }
    .tab { flex: 1; padding: 9px; border: none; border-radius: 9px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.5px; cursor: pointer; transition: all 0.2s; background: none; color: var(--muted); }
    .tab.active { background: var(--s3); color: var(--text); }

    /* PAGES */
    .page { display: none; }
    .page.active { display: block; }

    /* COUNTER */
    .counter-block { background: var(--s1); border: 1px solid var(--faint); border-radius: 24px; padding: 32px 28px; margin-bottom: 14px; position: relative; overflow: hidden; text-align: center; }
    .counter-block::after { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 80% 60% at 50% 0%, #a78bfa08, transparent 70%); pointer-events: none; }
    .days-number { font-family: var(--font-display); font-weight: 900; font-size: clamp(72px,22vw,96px); letter-spacing: -4px; line-height: 1; }
    .days-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-top: 6px; }
    .ring-wrap { display: flex; justify-content: center; margin: 24px 0 8px; }
    .ring-container { position: relative; width: 120px; height: 120px; }
    .ring-svg { width: 120px; height: 120px; transform: rotate(-90deg); }
    .ring-track { fill: none; stroke: var(--s3); stroke-width: 8; }
    .ring-fill { fill: none; stroke-width: 8; stroke-linecap: round; stroke-dasharray: 314; stroke-dashoffset: 314; transition: stroke-dashoffset 1s cubic-bezier(0.34,1.56,0.64,1), stroke 0.5s; }
    .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .ring-pct { font-family: var(--font-display); font-weight: 700; font-size: 22px; }
    .ring-pct-label { font-size: 9px; color: var(--muted); letter-spacing: 1px; margin-top: 2px; }
    .ring-next-label { font-size: 9px; color: var(--muted); margin-top: 8px; }

    /* TIME ROW */
    .time-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .time-card { background: var(--s1); border: 1px solid var(--faint); border-radius: 16px; padding: 14px 10px; text-align: center; display: flex; flex-direction: column; gap: 4px; }
    .time-val { font-family: var(--font-display); font-weight: 700; font-size: 20px; }
    .time-unit { font-size: 9px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; }

    /* GELD */
    .money-block { background: var(--s1); border: 1px solid var(--faint); border-radius: 20px; padding: 22px 24px; margin-bottom: 14px; position: relative; overflow: hidden; }
    .money-block::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--gold), #f59e0b00); }
    .money-label { font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
    .money-amount { font-family: var(--font-display); font-weight: 900; font-size: clamp(36px,10vw,48px); letter-spacing: -2px; color: var(--gold); line-height: 1; }
    .money-sub { font-size: 10px; color: var(--muted); margin-top: 6px; }

    /* MIJLPALEN */
    .milestones-block { background: var(--s1); border: 1px solid var(--faint); border-radius: 20px; padding: 20px; margin-bottom: 14px; }
    .block-title { font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px; }
    .milestone-list { display: flex; flex-direction: column; gap: 8px; }
    .milestone-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px; border-radius: 10px; border: 1px solid var(--faint); }
    .milestone-item.done { background: #0d1f18; border-color: #1a4030; }
    .milestone-item.next { border-color: var(--accent); background: #130f22; }
    .milestone-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
    .milestone-item.done .milestone-dot { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }
    .milestone-item.next .milestone-dot { background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 2s ease infinite; }
    .milestone-item:not(.done):not(.next) .milestone-dot { background: var(--faint); }
    @keyframes pulse { 0%,100%{opacity:1;}50%{opacity:0.3;} }
    .milestone-info { flex: 1; }
    .milestone-days { font-size: 12px; color: var(--text); }
    .milestone-item:not(.done):not(.next) .milestone-days { color: var(--muted); }
    .milestone-fact { font-size: 10px; margin-top: 4px; line-height: 1.5; }
    .milestone-item.done .milestone-fact { color: #4a7a60; }
    .milestone-item.next .milestone-fact { color: #7a6aaa; }
    .milestone-badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; flex-shrink: 0; margin-top: 1px; }
    .milestone-item.done .milestone-badge { background: #0d2a1a; color: var(--accent2); }
    .milestone-item.next .milestone-badge { background: #1a1030; color: var(--accent); }

    /* NOTIF */
    .notif-block { background: var(--s1); border: 1px solid var(--faint); border-radius: 20px; padding: 18px 20px; margin-bottom: 14px; }
    .notif-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .notif-left { display: flex; flex-direction: column; gap: 3px; }
    .notif-title { font-size: 11px; color: var(--text); }
    .notif-sub { font-size: 10px; color: var(--muted); }
    .notif-btn { background: var(--s3); border: 1px solid var(--faint); border-radius: 8px; color: var(--muted); font-family: var(--font-mono); font-size: 11px; padding: 8px 14px; cursor: pointer; transition: all 0.2s; white-space: nowrap; min-height: 36px; flex-shrink: 0; }
    .notif-btn.active { background: #0a1f30; border-color: var(--accent); color: var(--accent); }
    .time-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .time-chip { display: flex; align-items: center; gap: 6px; background: var(--s2); border: 1px solid var(--faint); border-radius: 20px; padding: 4px 10px; font-size: 11px; }
    .time-chip-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 0; line-height: 1; }
    .time-chip-del:hover { color: var(--danger); }
    .notif-add-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
    .time-inp { background: var(--s3); border: 1px solid var(--faint); border-radius: 8px; color: var(--text); font-family: var(--font-mono); font-size: 13px; padding: 7px 10px; }
    .time-inp:focus { outline: none; border-color: var(--accent); }
    .add-time-btn { background: var(--s3); border: 1px solid var(--faint); border-radius: 8px; color: var(--muted); font-family: var(--font-mono); font-size: 11px; padding: 7px 12px; cursor: pointer; min-height: 36px; transition: all 0.15s; }
    .add-time-btn:hover { border-color: var(--accent); color: var(--accent); }
    .hidden { display: none !important; }

    /* TOAST */
    .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(90px); background: var(--s2); border: 1px solid var(--faint); border-radius: 100px; padding: 11px 22px; font-size: 13px; color: var(--text); z-index: 999; transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1); white-space: nowrap; pointer-events: none; }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="bg-layer"></div>
<div class="app">

  <div class="header">
    <div class="header-label">Persoonlijk</div>
    <div class="header-title">NUCHTER<span>.</span></div>
    <div class="since-label" id="sinceLabel"></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('vandaag')">Vandaag</button>
    <button class="tab" onclick="switchTab('mijlpalen')">Mijlpalen</button>
    <button class="tab" onclick="switchTab('instellingen')">Instellingen</button>
  </div>

  <!-- TAB: VANDAAG -->
  <div class="page active" id="page-vandaag">
    <div class="counter-block">
      <div class="days-number" id="daysNumber">0</div>
      <div class="days-label">dagen nuchter</div>
      <div class="ring-wrap">
        <div class="ring-container">
          <svg class="ring-svg" viewBox="0 0 120 120">
            <circle class="ring-track" cx="60" cy="60" r="50" />
            <circle class="ring-fill" id="ringFill" cx="60" cy="60" r="50" />
          </svg>
          <div class="ring-center">
            <div class="ring-pct" id="ringPct">0%</div>
            <div class="ring-pct-label" id="ringLabel">naar dag 1</div>
          </div>
        </div>
      </div>
      <div class="ring-next-label" id="ringNextLabel"></div>
    </div>

    <div class="time-row">
      <div class="time-card">
        <div class="time-val" id="hoursVal">0</div>
        <div class="time-unit">Uren</div>
      </div>
      <div class="time-card">
        <div class="time-val" id="weeksVal">0</div>
        <div class="time-unit">Weken</div>
      </div>
      <div class="time-card">
        <div class="time-val" id="monthsVal">0</div>
        <div class="time-unit">Maanden</div>
      </div>
    </div>

    <div class="money-block">
      <div class="money-label">Geld bespaard</div>
      <div class="money-amount" id="moneyAmount">€ 0,00</div>
      <div class="money-sub" id="moneySub"></div>
    </div>
  </div>

  <!-- TAB: MIJLPALEN -->
  <div class="page" id="page-mijlpalen">
    <div class="milestones-block">
      <div class="block-title">Mijlpalen</div>
      <div class="milestone-list" id="milestoneList"></div>
    </div>
  </div>

  <!-- TAB: INSTELLINGEN -->
  <div class="page" id="page-instellingen">
    <div class="notif-block">
      <div class="notif-row">
        <div class="notif-left">
          <div class="notif-title">Dagelijkse herinnering</div>
          <div class="notif-sub" id="notifSub">Ontvang elke dag een melding</div>
        </div>
        <button class="notif-btn" id="notifBtn" onclick="toggleNotif()">Inschakelen</button>
      </div>
      <div id="notifExtra" class="hidden">
        <div class="notif-add-row">
          <input class="time-inp" type="time" id="timeInp" value="09:00" />
          <button class="add-time-btn" onclick="addTime()">+ Voeg toe</button>
        </div>
        <div class="time-chips" id="timeChips"></div>
      </div>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
  const START = new Date(2026, 4, 7, 0, 0, 0); // 7 mei 2026, lokale tijd
  const RATE = 32;
  const NOTIF_KEY = 'nuchter_notif';

  const MILESTONES = [
    { days: 1,   name: 'Eerste dag',    fact: 'Je lichaam begint al na 6 uur alcohol af te breken. Na 24 uur is je bloedsuiker stabieler.' },
    { days: 3,   name: 'Drie dagen',    fact: 'Slaapkwaliteit verbetert merkbaar. Angst en rusteloosheid nemen af naarmate je zenuwstelsel kalmeert.' },
    { days: 7,   name: 'Eerste week',   fact: 'Je lever heeft al significant minder vet. Bloeddruk daalt gemiddeld met 5 punten na één week.' },
    { days: 14,  name: 'Twee weken',    fact: 'Hydratatie van huid verbetert zichtbaar. Concentratie en geheugen zijn scherper dan een week geleden.' },
    { days: 21,  name: 'Drie weken',    fact: 'Vetverbranding is efficiënter. Hersenen produceren meer dopamine op een gezonde, natuurlijke manier.' },
    { days: 30,  name: 'Één maand',     fact: 'Levervet neemt af met gemiddeld 15%. Immuunsysteem is merkbaar sterker. Slaap is dieper en herstelbevorderend.' },
    { days: 50,  name: 'Vijftig dagen', fact: 'Risico op hartritmestoornissen neemt significant af. Energieniveau is structureel hoger dan voor de stop.' },
    { days: 60,  name: 'Twee maanden',  fact: 'Bloedwaarden zoals triglyceriden en glucose zijn meetbaar verbeterd. Huid ziet er jonger uit.' },
    { days: 75,  name: '75 dagen',      fact: 'Zenuwstelsel is grotendeels hersteld. Emotionele stabiliteit is aantoonbaar beter dan bij de start.' },
    { days: 100, name: '100 dagen',     fact: 'Lever is voor 90% hersteld bij matig gebruik. Kans op leverziekte daalt drastisch na 100 dagen.' },
    { days: 180, name: 'Zes maanden',   fact: 'Risico op mond-, keel- en slokdarmkanker is al meetbaar lager. Bloeddruk is structureel gedaald.' },
    { days: 365, name: 'Één jaar',      fact: 'Risico op hartziekte is gehalveerd. Lever functioneert als die van een niet-drinker.' },
  ];

  function getDays() { return Math.floor((new Date() - START) / 86400000); }
  function getHours() { return Math.floor((new Date() - START) / 3600000); }

  function render() {
    const days = getDays();
    const hours = getHours();
    const weeks = Math.floor(days / 7);
    const months = Math.floor(days / 30);

    document.getElementById('sinceLabel').textContent = 'Gestart op 7 mei 2026 · dag ' + (days + 1) + ' vandaag';
    document.getElementById('daysNumber').textContent = days;

    const doneMilestones = MILESTONES.filter(m => m.days <= days);
    const nextMilestone = MILESTONES.find(m => m.days > days);
    const prevMilestone = doneMilestones.length > 0 ? doneMilestones[doneMilestones.length - 1] : { days: 0 };

    let ringPct, ringColor, ringLabelText, ringNextText;
    if (nextMilestone) {
      const span = nextMilestone.days - prevMilestone.days;
      ringPct = (days - prevMilestone.days) / span;
      ringColor = '#a78bfa';
      ringLabelText = Math.round(ringPct * 100) + '%';
      const rem = nextMilestone.days - days;
      ringNextText = 'Nog ' + rem + ' dag' + (rem !== 1 ? 'en' : '') + ' tot ' + nextMilestone.name.toLowerCase();
    } else {
      ringPct = 1; ringColor = '#34d399';
      ringLabelText = '100%';
      ringNextText = 'Alle mijlpalen behaald 🎉';
    }

    const fill = document.getElementById('ringFill');
    fill.style.strokeDashoffset = 314 - ringPct * 314;
    fill.style.stroke = ringColor;
    fill.style.filter = 'drop-shadow(0 0 6px ' + ringColor + '88)';
    document.getElementById('ringPct').textContent = ringLabelText;
    document.getElementById('ringPct').style.color = ringColor;
    document.getElementById('ringLabel').textContent = nextMilestone ? 'naar ' + nextMilestone.name.toLowerCase() : 'voltooid';
    document.getElementById('ringNextLabel').textContent = ringNextText;

    document.getElementById('hoursVal').textContent = hours.toLocaleString('nl-NL');
    document.getElementById('weeksVal').textContent = weeks;
    document.getElementById('monthsVal').textContent = months;

    const saved = (days / 7) * RATE;
    document.getElementById('moneyAmount').textContent = '€ ' + saved.toFixed(2).replace('.', ',');
    document.getElementById('moneySub').textContent =
      '€ ' + RATE + ' per week · ' + weeks + ' volledige ' + (weeks === 1 ? 'week' : 'weken') +
      ' · € ' + (weeks * RATE).toFixed(2).replace('.', ',') + ' volledig bespaard';

    document.getElementById('milestoneList').innerHTML = MILESTONES.map(m => {
      const done = days >= m.days;
      const isNext = nextMilestone && m.days === nextMilestone.days;
      const rem = m.days - days;
      let badge = '';
      if (done) badge = '<span class="milestone-badge">✓ behaald</span>';
      else if (isNext) badge = '<span class="milestone-badge">nog ' + rem + 'd</span>';
      const showFact = done || isNext;
      return '<div class="milestone-item ' + (done ? 'done' : isNext ? 'next' : '') + '">' +
        '<div class="milestone-dot"></div>' +
        '<div class="milestone-info">' +
          '<div class="milestone-days">' + m.days + ' dagen — ' + m.name + '</div>' +
          (showFact ? '<div class="milestone-fact">' + m.fact + '</div>' : '') +
        '</div>' +
        badge + '</div>';
    }).join('');
  }

  // TABS
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((el, i) => {
      el.classList.toggle('active', ['vandaag','mijlpalen','instellingen'][i] === tab);
    });
    document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
    document.getElementById('page-' + tab).classList.add('active');
  }

  // NOTIFICATIES
  function getNotifSettings() {
    try { return JSON.parse(localStorage.getItem(NOTIF_KEY) || '{"enabled":false,"times":[]}'); }
    catch { return { enabled: false, times: [] }; }
  }
  function saveNotifSettings(s) { try { localStorage.setItem(NOTIF_KEY, JSON.stringify(s)); } catch {} }

  let reminderTimers = [];

  async function toggleNotif() {
    if (!('Notification' in window)) { showToast('Notificaties niet ondersteund.'); return; }
    const s = getNotifSettings();
    if (!s.enabled) {
      const perm = await Notification.requestPermission();
      if (perm !== 'granted') { showToast('Toestemming geweigerd in browserinstellingen.'); return; }
      s.enabled = true;
      if (!s.times.length) s.times = ['09:00'];
      saveNotifSettings(s);
      setupReminders(s.times);
      showToast('Herinneringen ingeschakeld.');
    } else {
      s.enabled = false;
      saveNotifSettings(s);
      reminderTimers.forEach(clearTimeout);
      reminderTimers = [];
      showToast('Herinneringen uitgeschakeld.');
    }
    renderNotif();
  }

  function addTime() {
    const val = document.getElementById('timeInp').value;
    if (!val) return;
    const s = getNotifSettings();
    if (s.times.includes(val)) { showToast('Staat er al bij.'); return; }
    if (s.times.length >= 6) { showToast('Maximaal 6 tijdstippen.'); return; }
    s.times.push(val); s.times.sort();
    saveNotifSettings(s);
    if (s.enabled) setupReminders(s.times);
    renderNotif();
  }

  function removeTime(t) {
    const s = getNotifSettings();
    s.times = s.times.filter(x => x !== t);
    saveNotifSettings(s);
    if (s.enabled) setupReminders(s.times);
    renderNotif();
  }

  function setupReminders(times) {
    reminderTimers.forEach(clearTimeout);
    reminderTimers = [];
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    const now = new Date();
    times.forEach(t => {
      const [h, m] = t.split(':').map(Number);
      const target = new Date(now);
      target.setHours(h, m, 0, 0);
      if (target <= now) target.setDate(target.getDate() + 1);
      const tid = setTimeout(() => {
        new Notification('Nuchter 💜', { body: getDays() + ' dagen nuchter. Goed bezig.', icon: '/icon-192.png' });
        setupReminders(times);
      }, target - now);
      reminderTimers.push(tid);
    });
  }

  function renderNotif() {
    const s = getNotifSettings();
    document.getElementById('notifBtn').textContent = s.enabled ? 'Uitschakelen' : 'Inschakelen';
    document.getElementById('notifBtn').className = 'notif-btn' + (s.enabled ? ' active' : '');
    document.getElementById('notifSub').textContent = s.enabled ? 'Actief' : 'Ontvang elke dag een melding';
    document.getElementById('notifExtra').className = s.enabled ? '' : 'hidden';
    document.getElementById('timeChips').innerHTML = s.times.map(t =>
      '<div class="time-chip"><span>' + t + '</span><button class="time-chip-del" onclick="removeTime(\'' + t + '\')">×</button></div>'
    ).join('');
  }

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});

  const initNotif = getNotifSettings();
  if (initNotif.enabled && 'Notification' in window && Notification.permission === 'granted') {
    setupReminders(initNotif.times);
  }
  renderNotif();
  render();
  setInterval(render, 60000);

  let toastT;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(toastT);
    toastT = setTimeout(() => el.classList.remove('show'), 2400);
  }
</script>
</body>
</html>
